openapi: 3.0.1
info:
  title: andmore-qr-codes API
  description: |
    QR code management, LinkTree-style public pages, and analytics.
    Two APIs:
    - Authenticated (Cognito JWT): /qrs, /pages, /analytics
    - Public (no auth, served through CloudFront): /r/{qrId}, /l/{clickId}, /public/pages/{slug}
  version: 2.0.0

tags:
  - name: QR Codes
  - name: Links Pages
  - name: Analytics
  - name: Public
  - name: Legacy

paths:
  # ── Legacy routes (transitional) ────────────────────────────────────────────
  /generate:
    post:
      operationId: GenerateQrLegacy
      summary: (LEGACY) Generate a QR code
      tags: [Legacy]
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateQrRequest' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/GenerateQrResponse' } } } }

  /history:
    get:
      operationId: GetHistoryLegacy
      summary: (LEGACY) Get QR code history
      tags: [Legacy]
      deprecated: true
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/HistoryResponse' } } } }

  # ── QR codes ───────────────────────────────────────────────────────────────
  /qrs:
    get:
      operationId: ListQrs
      summary: List the authenticated user's QR codes
      tags: [QR Codes]
      parameters:
        - name: includeDeleted
          in: query
          required: false
          schema: { type: boolean, default: false }
          description: When true, soft-deleted QRs are included.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QrCodeList' }
              example:
                items:
                  - qrId: abc123def4
                    userId: 9f8e7d6c-5b4a-4321-9876-543210abcdef
                    name: Conference booth
                    type: direct
                    destinationUrl: https://example.com/launch
                    pageId: null
                    qrCodeUrl: https://storage.example.com/qrcodes/.../v000002.png?X-Amz-Signature=...
                    logoUrl: null
                    enabled: true
                    currentVersion: 2
                    createdAt: 2026-04-20T12:34:56.000Z
                    updatedAt: 2026-04-20T13:00:00.000Z
    post:
      operationId: CreateQr
      summary: Create a QR code (direct-URL or page-backed)
      tags: [QR Codes]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateQrRequest' }
            example:
              name: Conference booth
              type: direct
              destinationUrl: https://example.com/launch
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QrCode' }
              example:
                qrId: abc123def4
                userId: 9f8e7d6c-5b4a-4321-9876-543210abcdef
                name: Conference booth
                type: direct
                destinationUrl: https://example.com/launch
                pageId: null
                qrCodeUrl: https://storage.example.com/qrcodes/.../v000001.png?X-Amz-Signature=...
                logoUrl: null
                enabled: true
                currentVersion: 1
                createdAt: 2026-04-20T12:34:56.000Z
                updatedAt: 2026-04-20T12:34:56.000Z
        '400': { $ref: '#/components/responses/ClientError' }

  /qrs/{qrId}:
    parameters: [{ name: qrId, in: path, required: true, schema: { type: string } }]
    get:
      operationId: GetQr
      tags: [QR Codes]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QrCode' }
              example:
                qrId: abc123def4
                userId: 9f8e7d6c-5b4a-4321-9876-543210abcdef
                name: Conference booth
                type: direct
                destinationUrl: https://example.com/launch
                pageId: null
                qrCodeUrl: https://storage.example.com/qrcodes/.../v000001.png?X-Amz-Signature=...
                logoUrl: null
                enabled: true
                currentVersion: 1
                createdAt: 2026-04-20T12:34:56.000Z
                updatedAt: 2026-04-20T12:34:56.000Z
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: UpdateQr
      tags: [QR Codes]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateQrRequest' }
            example:
              name: Conference booth (v2)
              destinationUrl: https://example.com/launch-2026
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QrCode' }
              example:
                qrId: abc123def4
                userId: 9f8e7d6c-5b4a-4321-9876-543210abcdef
                name: Conference booth (v2)
                type: direct
                destinationUrl: https://example.com/launch-2026
                pageId: null
                qrCodeUrl: https://storage.example.com/qrcodes/.../v000002.png?X-Amz-Signature=...
                logoUrl: null
                enabled: true
                currentVersion: 2
                createdAt: 2026-04-20T12:34:56.000Z
                updatedAt: 2026-04-20T13:00:00.000Z
        '400': { $ref: '#/components/responses/ClientError' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: DeleteQr
      summary: Soft delete — flips enabled=false and records deletedAt.
      tags: [QR Codes]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /qrs/{qrId}/versions:
    parameters: [{ name: qrId, in: path, required: true, schema: { type: string } }]
    get:
      operationId: ListQrVersions
      tags: [QR Codes]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionList' }
              example:
                items:
                  - version: 2
                    versionedAt: 2026-04-20T13:00:00.000Z
                  - version: 1
                    versionedAt: 2026-04-20T12:34:56.000Z
        '404': { $ref: '#/components/responses/NotFound' }

  /qrs/{qrId}/versions/{n}/restore:
    parameters:
      - { name: qrId, in: path, required: true, schema: { type: string } }
      - { name: n, in: path, required: true, schema: { type: integer } }
    post:
      operationId: RestoreQrVersion
      summary: Restore to version n — creates a new version snapshotting current state first.
      tags: [QR Codes]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QrCode' }
              example:
                qrId: abc123def4
                userId: 9f8e7d6c-5b4a-4321-9876-543210abcdef
                name: Conference booth
                type: direct
                destinationUrl: https://example.com/launch
                pageId: null
                qrCodeUrl: https://storage.example.com/qrcodes/.../v000003.png?X-Amz-Signature=...
                logoUrl: null
                enabled: true
                currentVersion: 3
                restoredFrom: 1
                createdAt: 2026-04-20T12:34:56.000Z
                updatedAt: 2026-04-20T14:00:00.000Z
        '400': { $ref: '#/components/responses/ClientError' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Links Pages ────────────────────────────────────────────────────────────
  /pages:
    get:
      operationId: ListPages
      tags: [Links Pages]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LinkPageList' }
              example:
                items:
                  - pageId: pg_abc123
                    userId: 11111111-2222-3333-4444-555555555555
                    slug: myname
                    displayName: My Name
                    bio: Hello!
                    avatarUrl: https://example.s3.amazonaws.com/avatars/...presigned
                    theme: dark
                    accentColor: '#22C55E'
                    links: []
                    status: draft
                    currentVersion: 1
                    createdAt: 2026-04-20T12:00:00.000Z
                    updatedAt: 2026-04-20T12:00:00.000Z
    post:
      operationId: CreatePage
      tags: [Links Pages]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePageRequest' }
            example:
              slug: myname
              displayName: My Name
              bio: Hello!
              theme: dark
              accentColor: '#22C55E'
              links:
                - kind: x
                  label: Follow on X
                  url: https://x.com/myname
                  order: 0
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LinkPage' }
              example:
                pageId: pg_abc123
                userId: 11111111-2222-3333-4444-555555555555
                slug: myname
                displayName: My Name
                bio: Hello!
                theme: dark
                accentColor: '#22C55E'
                links: []
                status: draft
                currentVersion: 1
                createdAt: 2026-04-20T12:00:00.000Z
                updatedAt: 2026-04-20T12:00:00.000Z
        '400': { $ref: '#/components/responses/ClientError' }
        '409': { $ref: '#/components/responses/SlugConflict' }

  /pages/{pageId}:
    parameters: [{ name: pageId, in: path, required: true, schema: { type: string } }]
    get:
      operationId: GetPage
      tags: [Links Pages]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LinkPage' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: UpdatePage
      tags: [Links Pages]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePageRequest' }
            example:
              displayName: Updated Name
              accentColor: '#FF0080'
              avatarBase64: iVBORw0KGgoAAAANSUhEUgAA...
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LinkPage' }
        '400': { $ref: '#/components/responses/ClientError' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/SlugConflict' }
    delete:
      operationId: DeletePage
      tags: [Links Pages]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /pages/{pageId}/publish:
    parameters: [{ name: pageId, in: path, required: true, schema: { type: string } }]
    post:
      operationId: PublishPage
      tags: [Links Pages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { published: { type: boolean } }
              required: [published]
            example:
              published: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LinkPage' }
              example:
                pageId: pg_abc123
                slug: myname
                status: published
                currentVersion: 3
                updatedAt: 2026-04-20T12:30:00.000Z
        '400': { $ref: '#/components/responses/ClientError' }
        '404': { $ref: '#/components/responses/NotFound' }

  /pages/{pageId}/preview:
    parameters: [{ name: pageId, in: path, required: true, schema: { type: string } }]
    get:
      operationId: GetPagePreview
      summary: Owner-scoped draft preview — returns the PublicPage payload for a draft or published page without publishing it
      tags: [Links Pages]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicPage' }
              example:
                slug: jane-doe
                displayName: Jane Doe
                bio: Building things at the edges of software and design.
                avatarUrl: https://example-bucket.s3.amazonaws.com/avatars/abc123/page_xyz/v3.png?X-Amz-Signature=...
                theme: dark
                accentColor: '#22C55E'
                links:
                  - linkKey: lk_01HZX1
                    kind: x
                    label: '@janedoe'
                    icon: null
                    clickHref: /l/amFuZS1kb2U6bGtfMDFIWlgx
        '404': { $ref: '#/components/responses/NotFound' }

  /pages/{pageId}/versions:
    parameters: [{ name: pageId, in: path, required: true, schema: { type: string } }]
    get:
      operationId: ListPageVersions
      tags: [Links Pages]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionList' }
              example:
                items:
                  - version: 2
                    versionedAt: 2026-04-20T12:15:00.000Z
                  - version: 1
                    versionedAt: 2026-04-20T12:00:00.000Z
        '404': { $ref: '#/components/responses/NotFound' }

  /pages/{pageId}/versions/{n}/restore:
    parameters:
      - { name: pageId, in: path, required: true, schema: { type: string } }
      - { name: n, in: path, required: true, schema: { type: integer } }
    post:
      operationId: RestorePageVersion
      tags: [Links Pages]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LinkPage' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/SlugConflict' }

  # ── Analytics ──────────────────────────────────────────────────────────────
  /analytics/qrs/{qrId}:
    parameters:
      - { name: qrId, in: path, required: true, schema: { type: string } }
      - { name: from, in: query, schema: { type: string, format: date }, description: Start date (YYYY-MM-DD) inclusive. Defaults to today-30d. }
      - { name: to, in: query, schema: { type: string, format: date }, description: End date (YYYY-MM-DD) inclusive. Defaults to today. }
    get:
      operationId: GetQrAnalytics
      summary: Scan + click analytics for a single QR (page-backed QRs include per-link click totals)
      tags: [Analytics]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalyticsSummary' }
              examples:
                pageBacked:
                  summary: Page-backed QR with three link clicks and two scans
                  value:
                    qrId: q8c2hd9e1k
                    totalScans: 2
                    totalClicks: 3
                    byDay:
                      - { bucket: '2026-04-18', count: 1 }
                      - { bucket: '2026-04-19', count: 2 }
                      - { bucket: '2026-04-20', count: 2 }
                    byCountry:
                      - { country: US, count: 3 }
                      - { country: MX, count: 2 }
                    byDevice:
                      - { deviceType: mobile, count: 4 }
                      - { deviceType: desktop, count: 1 }
                    byLink:
                      - { linkKey: lk_x, count: 2 }
                      - { linkKey: lk_github, count: 1 }
                      - { linkKey: lk_blog, count: 0 }
                direct:
                  summary: Direct-URL QR (no byLink)
                  value:
                    qrId: q1a2b3c4d5
                    totalScans: 7
                    totalClicks: 0
                    byDay:
                      - { bucket: '2026-04-20', count: 7 }
                    byCountry:
                      - { country: US, count: 5 }
                      - { country: CA, count: 2 }
                    byDevice:
                      - { deviceType: mobile, count: 6 }
                      - { deviceType: desktop, count: 1 }
        '400': { $ref: '#/components/responses/ClientError' }
        '404': { $ref: '#/components/responses/NotFound' }

  /analytics/summary:
    get:
      operationId: GetAnalyticsSummary
      summary: Dashboard summary (totals, last 30 days bucket, recent QRs/pages) for the caller
      tags: [Analytics]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardSummary' }
              examples:
                dashboard:
                  summary: Typical dashboard payload
                  value:
                    totalQrs: 4
                    totalPages: 2
                    scansLast30Days: 51
                    clicksLast30Days: 18
                    recentQrs:
                      - { qrId: q8c2hd9e1k, name: 'Launch poster', type: page, updatedAt: '2026-04-20T13:30:00.000Z' }
                      - { qrId: q1a2b3c4d5, name: 'Menu link', type: direct, updatedAt: '2026-04-19T09:02:11.000Z' }
                    recentPages:
                      - { pageId: p9k3l2m1n0, slug: andres, displayName: 'Andres Moreno', status: published, updatedAt: '2026-04-20T13:29:55.000Z' }
                    scansByDay:
                      - { bucket: '2026-03-22', count: 0 }
                      - { bucket: '2026-04-19', count: 12 }
                      - { bucket: '2026-04-20', count: 7 }
                    byCountry:
                      - { country: US, count: 28 }
                      - { country: MX, count: 14 }
                      - { country: CA, count: 9 }

  # ── Public (no auth) ───────────────────────────────────────────────────────
  /r/{qrId}:
    parameters: [{ name: qrId, in: path, required: true, schema: { type: string } }]
    get:
      operationId: ScanRedirect
      summary: Resolve a QR scan to its destination, recording a scan event
      tags: [Public]
      responses:
        '302':
          description: Redirect to destination
          headers:
            Location:
              description: |
                Target URL for the scan. For `type=direct` QRs this is the configured
                `destinationUrl`. For `type=page` QRs with a published page this is
                `https://{host}/p/{slug}?src={qrId}`; when the page is unpublished the
                location is `https://{host}/p/unavailable`.
              schema: { type: string, format: uri }
              example: https://example.com/
        '404':
          description: QR not found or disabled
          content:
            application/json:
              schema:
                type: object
                properties: { error: { type: string } }
              example: { error: 'Not found' }

  /l/{clickId}:
    parameters:
      - { name: clickId, in: path, required: true, schema: { type: string }, description: 'base64url-encoded `{slug}:{linkKey}`' }
      - { name: src, in: query, required: false, schema: { type: string }, description: 'Originating QR id; when present, a click event is recorded.' }
    get:
      operationId: ClickRedirect
      summary: Resolve a link click, recording a click event
      tags: [Public]
      responses:
        '302':
          description: Redirect to the link's destination URL
          headers:
            Location:
              description: The configured `url` of the matched link on the page.
              schema: { type: string, format: uri }
              example: https://x.com/example
        '404':
          description: Malformed clickId, page not found, or link not found
          content:
            application/json:
              schema:
                type: object
                properties: { error: { type: string } }
              example: { error: 'Not found' }

  /public/pages/{slug}:
    parameters: [{ name: slug, in: path, required: true, schema: { type: string } }]
    get:
      operationId: GetPublicPage
      summary: Fetch a published Links Page's public payload for SPA rendering
      tags: [Public]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicPage' }
              example:
                slug: jane-doe
                displayName: Jane Doe
                bio: Building things at the edges of software and design.
                avatarUrl: https://example-bucket.s3.amazonaws.com/avatars/abc123/page_xyz/v3.png?X-Amz-Signature=...
                theme: dark
                accentColor: '#22C55E'
                links:
                  - linkKey: lk_01HZX1
                    kind: x
                    label: '@janedoe'
                    icon: null
                    clickHref: /l/amFuZS1kb2U6bGtfMDFIWlgx
                  - linkKey: lk_01HZX2
                    kind: github
                    label: janedoe
                    icon: null
                    clickHref: /l/amFuZS1kb2U6bGtfMDFIWlgy
                  - linkKey: lk_01HZX3
                    kind: custom
                    label: Newsletter
                    icon: mail
                    clickHref: /l/amFuZS1kb2U6bGtfMDFIWlgz
        '404': { description: Page not found or not published }

components:
  schemas:
    LinkKind:
      type: string
      enum: [x, linkedin, youtube, github, blog, custom]

    LinkItem:
      type: object
      required: [linkKey, kind, label, url, order]
      properties:
        linkKey: { type: string }
        kind: { $ref: '#/components/schemas/LinkKind' }
        label: { type: string }
        url: { type: string, format: uri }
        icon: { type: string, nullable: true }
        order: { type: integer }

    LinkPage:
      type: object
      required: [pageId, userId, slug, displayName, bio, theme, accentColor, links, status, currentVersion, createdAt, updatedAt]
      properties:
        pageId: { type: string }
        userId: { type: string }
        slug: { type: string }
        displayName: { type: string }
        bio: { type: string }
        avatarUrl: { type: string, format: uri, nullable: true }
        theme: { type: string, enum: [light, dark] }
        accentColor: { type: string }
        links: { type: array, items: { $ref: '#/components/schemas/LinkItem' } }
        status: { type: string, enum: [draft, published] }
        currentVersion: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    LinkPageList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/LinkPage' } }

    CreatePageRequest:
      type: object
      required: [slug, displayName]
      properties:
        slug: { type: string }
        displayName: { type: string }
        bio: { type: string }
        theme: { type: string, enum: [light, dark], default: dark }
        accentColor: { type: string, default: '#22C55E' }
        links: { type: array, items: { $ref: '#/components/schemas/LinkItem' } }

    UpdatePageRequest:
      type: object
      properties:
        slug: { type: string }
        displayName: { type: string }
        bio: { type: string }
        avatarBase64: { type: string, nullable: true, description: Base64 PNG/JPEG avatar }
        theme: { type: string, enum: [light, dark] }
        accentColor: { type: string }
        links: { type: array, items: { $ref: '#/components/schemas/LinkItem' } }

    QrCode:
      type: object
      required: [qrId, userId, name, type, qrCodeUrl, enabled, currentVersion, createdAt, updatedAt]
      properties:
        qrId: { type: string }
        userId: { type: string }
        name: { type: string }
        type: { type: string, enum: [direct, page] }
        destinationUrl: { type: string, format: uri, nullable: true }
        pageId: { type: string, nullable: true }
        qrCodeUrl: { type: string, format: uri, description: Presigned S3 URL (1h) }
        logoUrl: { type: string, format: uri, nullable: true }
        enabled: { type: boolean }
        currentVersion: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    QrCodeList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/QrCode' } }

    CreateQrRequest:
      type: object
      required: [name, type]
      properties:
        name: { type: string }
        type: { type: string, enum: [direct, page] }
        destinationUrl: { type: string, format: uri, description: Required when type=direct }
        pageId: { type: string, description: Required when type=page }
        logoBase64: { type: string, nullable: true }

    UpdateQrRequest:
      type: object
      properties:
        name: { type: string }
        destinationUrl: { type: string, format: uri }
        pageId: { type: string }
        logoBase64: { type: string, nullable: true }
        enabled: { type: boolean }

    VersionList:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              version: { type: integer }
              versionedAt: { type: string, format: date-time }
              note: { type: string, nullable: true }

    PublicPage:
      type: object
      required: [slug, displayName, theme, accentColor, links]
      properties:
        slug: { type: string }
        displayName: { type: string }
        bio: { type: string }
        avatarUrl: { type: string, format: uri, nullable: true }
        theme: { type: string, enum: [light, dark] }
        accentColor: { type: string }
        links:
          type: array
          items:
            type: object
            properties:
              linkKey: { type: string }
              kind: { $ref: '#/components/schemas/LinkKind' }
              label: { type: string }
              icon: { type: string, nullable: true }
              clickHref: { type: string }

    AnalyticsBucket:
      type: object
      properties:
        bucket: { type: string }
        count: { type: integer }

    AnalyticsSummary:
      type: object
      properties:
        qrId: { type: string }
        totalScans: { type: integer }
        totalClicks: { type: integer }
        byDay: { type: array, items: { $ref: '#/components/schemas/AnalyticsBucket' } }
        byCountry:
          type: array
          items:
            type: object
            properties: { country: { type: string }, count: { type: integer } }
        byDevice:
          type: array
          items:
            type: object
            properties: { deviceType: { type: string }, count: { type: integer } }
        byLink:
          type: array
          items:
            type: object
            properties: { linkKey: { type: string }, count: { type: integer } }

    DashboardSummary:
      type: object
      properties:
        totalQrs: { type: integer }
        totalPages: { type: integer }
        scansLast30Days: { type: integer }
        clicksLast30Days: { type: integer }
        recentQrs:
          type: array
          items:
            type: object
            properties:
              qrId: { type: string }
              name: { type: string }
              type: { type: string, enum: [direct, page] }
              updatedAt: { type: string, format: date-time }
        recentPages:
          type: array
          items:
            type: object
            properties:
              pageId: { type: string }
              slug: { type: string }
              displayName: { type: string }
              status: { type: string, enum: [draft, published] }
              updatedAt: { type: string, format: date-time }
        scansByDay: { type: array, items: { $ref: '#/components/schemas/AnalyticsBucket' } }
        byCountry:
          type: array
          items:
            type: object
            properties: { country: { type: string }, count: { type: integer } }

    # Legacy schemas retained for transition
    GenerateQrRequest:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }
        image: { type: string, description: Base64-encoded image }

    GenerateQrResponse:
      type: object
      properties:
        id: { type: string }
        qrCode: { type: string }

    HistoryItem:
      type: object
      properties:
        id: { type: string }
        url: { type: string, format: uri }
        createdAt: { type: string, format: date-time }
        qrCodeUrl: { type: string, format: uri }
        imageUrl: { type: string, format: uri, nullable: true }

    HistoryResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/HistoryItem' } }

  responses:
    ClientError:
      description: The request was invalid
      content:
        application/json:
          schema:
            type: object
            properties: { error: { type: string } }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties: { error: { type: string } }
    SlugConflict:
      description: Slug already taken
      content:
        application/json:
          schema:
            type: object
            properties: { error: { type: string } }
    InternalServerError:
      description: An unexpected error occurred
      content:
        application/json:
          schema:
            type: object
            properties: { error: { type: string } }
