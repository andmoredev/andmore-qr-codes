AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: QR Code Generator - Serverless infrastructure

Parameters:
  ArtifactsBucketName:
    Type: String
    Description: S3 bucket name for deployment artifacts

  EnvironmentHash:
    Type: String
    Description: A hash of the current environment

  CognitoUserPoolId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /andmoredev-auth/CognitoUserPoolId

  CognitoUserPoolUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /andmoredev-auth/CognitoUserPoolUrl

  PublicBaseUrl:
    Type: String
    Default: ""
    Description: >
      Public-facing origin used by the scan-redirect Lambda to build /p/{slug}
      URLs (e.g. https://d1234.cloudfront.net). Leave blank on the initial
      deploy; after the stack is up, read CloudFrontUrl from the Outputs and
      redeploy with --parameter-overrides PublicBaseUrl=<that value>. Avoids
      a FrontendDistribution <-> PublicApi <-> Function circular dependency.

  AllowedOrigin:
    Type: String
    Default: "*"
    Description: >
      Origin allowed to hit the authenticated API. Defaults to "*" so a fresh
      deploy isn't blocked, but production deploys should set this to the
      CloudFront or custom domain (e.g. https://d1234.cloudfront.net) via
      --parameter-overrides AllowedOrigin=<value>.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Tracing: Active
    Environment:
      Variables:
        STORAGE_BUCKET_NAME: !Ref StorageBucket
        HISTORY_TABLE_NAME: !Ref HistoryTable
        APP_TABLE_NAME: !Ref AppTable
        EVENTS_TABLE_NAME: !Ref EventsTable
        ALLOWED_ORIGIN: !Ref AllowedOrigin

Resources:
  # ── Auth ──────────────────────────────────────────────────────────────────

  QrCodesUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPoolId
      ClientName: andmore-qr-codes
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      PreventUserExistenceErrors: ENABLED

  # ── API ───────────────────────────────────────────────────────────────────

  QrRestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: v1
      Cors:
        AllowOrigin: !Sub "'${AllowedOrigin}'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,PATCH,DELETE,OPTIONS'"
      Auth:
        DefaultAuthorizer: CognitoAuth
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuth:
            UserPoolArn: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}"

  PublicApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: v1
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type'"
        AllowMethods: "'GET,OPTIONS'"

  # ── Storage ───────────────────────────────────────────────────────────────

  StorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedHeaders: ["*"]
            AllowedMethods: [GET]
            MaxAge: 3600

  HistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE

  AppTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # ── Lambda functions ──────────────────────────────────────────────────────

  GenerateQrFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: generate-qr.handler
      Description: Generates a QR code with an embedded center image
      Events:
        PostGenerate:
          Type: Api
          Properties:
            RestApiId: !Ref QrRestApi
            Path: /generate
            Method: POST
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub "${StorageBucket.Arn}/*"
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt HistoryTable.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - generate-qr.js
        External:
          - "@aws-sdk/*"

  GetHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: get-history.handler
      Description: Returns the authenticated user's QR code history
      Events:
        GetHistory:
          Type: Api
          Properties:
            RestApiId: !Ref QrRestApi
            Path: /history
            Method: GET
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !GetAtt HistoryTable.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "${StorageBucket.Arn}/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - get-history.js
        External:
          - "@aws-sdk/*"

  # ── QR CRUD (workstream B) ────────────────────────────────────────────────

  QrsListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: qrs-list.handler
      Description: List the caller's QR codes with presigned URLs
      Events:
        QrsList:
          Type: Api
          Properties:
            RestApiId: !Ref QrRestApi
            Path: /qrs
            Method: GET
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !GetAtt AppTable.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                - !Sub "${StorageBucket.Arn}/qrcodes/*"
                - !Sub "${StorageBucket.Arn}/logos/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - qrs-list.js
        External:
          - "@aws-sdk/*"

  QrsCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: qrs-create.handler
      Description: Create a direct or page-backed QR code
      Environment:
        Variables:
          PUBLIC_BASE_URL: !Sub "https://${FrontendDistribution.DomainName}"
      Events:
        QrsCreate:
          Type: Api
          Properties:
            RestApiId: !Ref QrRestApi
            Path: /qrs
            Method: POST
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:TransactWriteItems
              Resource: !GetAtt AppTable.Arn
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                - !Sub "${StorageBucket.Arn}/qrcodes/*"
                - !Sub "${StorageBucket.Arn}/logos/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - qrs-create.js
        External:
          - "@aws-sdk/*"

  QrsGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: qrs-get.handler
      Description: Fetch a single QR code owned by the caller
      Events:
        QrsGet:
          Type: Api
          Properties:
            RestApiId: !Ref QrRestApi
            Path: /qrs/{qrId}
            Method: GET
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt AppTable.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                - !Sub "${StorageBucket.Arn}/qrcodes/*"
                - !Sub "${StorageBucket.Arn}/logos/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - qrs-get.js
        External:
          - "@aws-sdk/*"

  QrsUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: qrs-update.handler
      Description: Update a QR code and snapshot the prior state as a new version
      Environment:
        Variables:
          PUBLIC_BASE_URL: !Sub "https://${FrontendDistribution.DomainName}"
      Events:
        QrsUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref QrRestApi
            Path: /qrs/{qrId}
            Method: PATCH
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:TransactWriteItems
              Resource: !GetAtt AppTable.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource:
                - !Sub "${StorageBucket.Arn}/qrcodes/*"
                - !Sub "${StorageBucket.Arn}/logos/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - qrs-update.js
        External:
          - "@aws-sdk/*"

  QrsDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: qrs-delete.handler
      Description: Soft-delete a QR code (enabled=false, deletedAt set)
      Events:
        QrsDelete:
          Type: Api
          Properties:
            RestApiId: !Ref QrRestApi
            Path: /qrs/{qrId}
            Method: DELETE
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:TransactWriteItems
              Resource: !GetAtt AppTable.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - qrs-delete.js
        External:
          - "@aws-sdk/*"

  QrsVersionsListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: qrs-versions-list.handler
      Description: List the version history of a QR code, newest first
      Events:
        QrsVerList:
          Type: Api
          Properties:
            RestApiId: !Ref QrRestApi
            Path: /qrs/{qrId}/versions
            Method: GET
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
              Resource: !GetAtt AppTable.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - qrs-versions-list.js
        External:
          - "@aws-sdk/*"

  QrsVersionsRestoreFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: qrs-versions-restore.handler
      Description: Restore a QR code to a prior version (snapshots current state)
      Environment:
        Variables:
          PUBLIC_BASE_URL: !Sub "https://${FrontendDistribution.DomainName}"
      Events:
        QrsVerRestore:
          Type: Api
          Properties:
            RestApiId: !Ref QrRestApi
            Path: /qrs/{qrId}/versions/{n}/restore
            Method: POST
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:TransactWriteItems
              Resource: !GetAtt AppTable.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource:
                - !Sub "${StorageBucket.Arn}/qrcodes/*"
                - !Sub "${StorageBucket.Arn}/logos/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - qrs-versions-restore.js
        External:
          - "@aws-sdk/*"

  # ── Scaffolded stub functions (foundation PR) ─────────────────────────────
  # Each feature PR replaces its route(s) by (a) creating a new Function with
  # the real handler and (b) removing the Event below. The stubs return 501.

  AnalyticsQrFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: analytics-qr.handler
      Description: Returns scan/click analytics for a single QR owned by the caller
      Events:
        GetQrAnalytics:
          Type: Api
          Properties:
            RestApiId: !Ref QrRestApi
            Path: '/analytics/qrs/{qrId}'
            Method: GET
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
              Resource:
                - !GetAtt AppTable.Arn
                - !GetAtt EventsTable.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - analytics-qr.js
        External:
          - "@aws-sdk/*"

  AnalyticsSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: analytics-summary.handler
      Description: Returns an aggregated dashboard summary for the caller
      Events:
        GetAnalyticsSummary:
          Type: Api
          Properties:
            RestApiId: !Ref QrRestApi
            Path: /analytics/summary
            Method: GET
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
              Resource:
                - !GetAtt AppTable.Arn
                - !GetAtt EventsTable.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - analytics-summary.js
        External:
          - "@aws-sdk/*"

  # ── Links Pages CRUD (workstream C) ───────────────────────────────────────

  PagesListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: pages-list.handler
      Description: Lists the caller's Links Pages
      Events:
        PagesList:
          Type: Api
          Properties: { RestApiId: !Ref QrRestApi, Path: /pages, Method: GET }
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !GetAtt AppTable.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "${StorageBucket.Arn}/avatars/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - pages-list.js
        External:
          - "@aws-sdk/*"

  PagesCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: pages-create.handler
      Description: Creates a new Links Page (draft) with atomic slug reservation
      Events:
        PagesCreate:
          Type: Api
          Properties: { RestApiId: !Ref QrRestApi, Path: /pages, Method: POST }
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:TransactWriteItems
              Resource: !GetAtt AppTable.Arn
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub "${StorageBucket.Arn}/avatars/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - pages-create.js
        External:
          - "@aws-sdk/*"

  PagesGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: pages-get.handler
      Description: Fetches a single Links Page owned by the caller
      Events:
        PagesGet:
          Type: Api
          Properties: { RestApiId: !Ref QrRestApi, Path: '/pages/{pageId}', Method: GET }
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt AppTable.Arn
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "${StorageBucket.Arn}/avatars/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - pages-get.js
        External:
          - "@aws-sdk/*"

  PagesUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: pages-update.handler
      Description: Updates a Links Page, snapshotting prior state and reserving a new slug when changed
      Events:
        PagesUpdate:
          Type: Api
          Properties: { RestApiId: !Ref QrRestApi, Path: '/pages/{pageId}', Method: PATCH }
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:TransactWriteItems
              Resource: !GetAtt AppTable.Arn
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub "${StorageBucket.Arn}/avatars/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - pages-update.js
        External:
          - "@aws-sdk/*"

  PagesDeleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: pages-delete.handler
      Description: Hard-deletes a Links Page, slug reservation, and every version snapshot
      Events:
        PagesDelete:
          Type: Api
          Properties: { RestApiId: !Ref QrRestApi, Path: '/pages/{pageId}', Method: DELETE }
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:BatchWriteItem
                - dynamodb:TransactWriteItems
              Resource: !GetAtt AppTable.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
