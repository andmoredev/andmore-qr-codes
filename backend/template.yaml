  # ── Frontend hosting ──────────────────────────────────────────────────────

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "andmore-qr-codes-oac-${EnvironmentHash}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  PublicApiOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub "andmore-qr-public-api-${EnvironmentHash}"
        Comment: "Whitelists PublicApi headers; omits Host so API Gateway accepts the request."
        HeadersConfig:
          HeaderBehavior: whitelist
          Headers:
            - User-Agent
            - Referer
            - CloudFront-Viewer-Country
            - X-Forwarded-For
            - Accept-Language
        CookiesConfig:
          CookieBehavior: none
        QueryStringsConfig:
          QueryStringBehavior: all

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt FrontendOAC.Id
            S3OriginConfig: {}
          - Id: PublicApiOrigin
            DomainName: !Sub "${PublicApi}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: /v1
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          AllowedMethods: [GET, HEAD]
        CacheBehaviors:
          - PathPattern: /r/*
            TargetOriginId: PublicApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: !Ref PublicApiOriginRequestPolicy
          - PathPattern: /l/*
            TargetOriginId: PublicApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: !Ref PublicApiOriginRequestPolicy
          - PathPattern: /public/*
            TargetOriginId: PublicApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: !Ref PublicApiOriginRequestPolicy
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  ApiUrl:
    Description: Authenticated API base URL
    Value: !Sub "https://${QrRestApi}.execute-api.${AWS::Region}.amazonaws.com/v1"

  PublicApiUrl:
    Description: Public (unauthenticated) API base URL — fronted by CloudFront
    Value: !Sub "https://${PublicApi}.execute-api.${AWS::Region}.amazonaws.com/v1"

  AppTableName:
    Description: DynamoDB table for entities (QRs, pages, versions, slugs)
    Value: !Ref AppTable

  EventsTableName:
    Description: DynamoDB table for scan and click events
    Value: !Ref EventsTable

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPoolId

  CognitoUserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref QrCodesUserPoolClient

  CognitoUserPoolUrl:
    Description: Cognito User Pool URL
    Value: !Ref CognitoUserPoolUrl

  FrontendBucketName:
    Description: S3 bucket for frontend assets
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref FrontendDistribution

  CloudFrontUrl:
    Description: Frontend URL
    Value: !Sub "https://${FrontendDistribution.DomainName}"
