name: Deploy
run-name: Deploy - ${{ github.actor }}

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yaml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yaml'

concurrency:
  group: deploy-${{ github.actor }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  STACK_NAME: andmore-qr-codes
  NODE_VERSION: '24'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.outputs.outputs.api_url }}
      user_pool_id: ${{ steps.outputs.outputs.user_pool_id }}
      user_pool_client_id: ${{ steps.outputs.outputs.user_pool_client_id }}
      user_pool_url: ${{ steps.outputs.outputs.user_pool_url }}
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      cf_dist_id: ${{ steps.outputs.outputs.cf_dist_id }}
      cf_url: ${{ steps.outputs.outputs.cf_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.PIPELINE_EXECUTION_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate samconfig.yaml from template
        working-directory: backend
        env:
          STACK_NAME: ${{ env.STACK_NAME }}
          ENV_HASH: ${{ github.sha }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ARTIFACTS_BUCKET_NAME: ${{ secrets.ARTIFACTS_BUCKET_NAME }}
        run: envsubst < samconfig.yaml.template > samconfig.yaml

      - name: Build and deploy
        working-directory: backend
        run: |
          npm ci
          npm install -g esbuild
          sam build
          sam deploy \
            --s3-bucket "${{ secrets.ARTIFACTS_BUCKET_NAME }}" \
            --role-arn "${{ secrets.CLOUDFORMATION_EXECUTION_ROLE }}" \
            --no-fail-on-empty-changeset

      - name: Get stack outputs
        id: outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query 'Stacks[0].Outputs' --output json)

          get() { echo "$OUTPUTS" | jq -r ".[] | select(.OutputKey==\"$1\") | .OutputValue"; }

          echo "api_url=$(get ApiUrl)" >> $GITHUB_OUTPUT
          echo "user_pool_id=$(get CognitoUserPoolId)" >> $GITHUB_OUTPUT
          echo "user_pool_client_id=$(get CognitoUserPoolClientId)" >> $GITHUB_OUTPUT
          echo "user_pool_url=$(get CognitoUserPoolUrl)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(get FrontendBucketName)" >> $GITHUB_OUTPUT
          echo "cf_dist_id=$(get CloudFrontDistributionId)" >> $GITHUB_OUTPUT
          echo "cf_url=$(get CloudFrontUrl)" >> $GITHUB_OUTPUT

          echo "## Backend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**API URL:** $(get ApiUrl)" >> $GITHUB_STEP_SUMMARY

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.PIPELINE_EXECUTION_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ needs.deploy-backend.outputs.api_url }}
          VITE_USER_POOL_ID: ${{ needs.deploy-backend.outputs.user_pool_id }}
          VITE_USER_POOL_CLIENT_ID: ${{ needs.deploy-backend.outputs.user_pool_client_id }}
          VITE_USER_POOL_URL: ${{ needs.deploy-backend.outputs.user_pool_url }}
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
        run: npm ci && npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist s3://${{ needs.deploy-backend.outputs.frontend_bucket }} \
            --delete --exclude "assets/*" --cache-control "no-cache,must-revalidate"
          aws s3 sync frontend/dist/assets s3://${{ needs.deploy-backend.outputs.frontend_bucket }}/assets \
            --delete --cache-control "max-age=31536000,immutable"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.deploy-backend.outputs.cf_dist_id }} \
            --paths "/*"

          echo "## Frontend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ needs.deploy-backend.outputs.cf_url }}" >> $GITHUB_STEP_SUMMARY

      - name: Comment deploy URLs on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: deploy-urls
          message: |
            ### Deploy preview

            | Surface | URL |
            |---|---|
            | Frontend | ${{ needs.deploy-backend.outputs.cf_url }} |
            | API | ${{ needs.deploy-backend.outputs.api_url }} |

            <sub>Updated for commit `${{ github.event.pull_request.head.sha }}` · [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>
